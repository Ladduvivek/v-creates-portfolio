<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V Creates | Video Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f0f0f;
    color: white;
    text-align: center;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: rgba(0,0,0,0.7);
    position: sticky;
    top: 0;
}

nav h1 {
    font-size: 22px;
    color: #00ffd5;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* HERO */
.hero {
    padding: 80px 20px;
}

.hero img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #00ffd5;
}

.hero h2 {
    margin-top: 20px;
    font-size: 28px;
}

.hero p {
    margin-top: 10px;
    color: #aaa;
}

/* BUTTONS */
.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00ffd5;
    color: black;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

/* VIDEOS */
.videos {
    padding: 50px 20px;
}

.video-card {
    margin: 20px auto;
    max-width: 600px;
}

/* CONTACT */
.contact {
    padding: 50px 20px;
}

.contact a {
    display: block;
    margin: 10px;
    color: #00ffd5;
    text-decoration: none;
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00ffd5;
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h1>V Creates</h1>
<div>
<a href="#work">Work</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<img src="profile.jpg" alt="profile">
<h2>Vivek Gande</h2>
<p>Video Editor specializing in reels, YouTube content, cinematic storytelling & marketing edits.</p>

<button class="btn" onclick="playMusic()">🎵 Play Music</button>
</section>

<!-- VIDEOS -->
<section class="videos" id="work">
<h2>My Work</h2>

<div class="video-card">
<iframe width="100%" height="315" src="https://www.youtube.com/embed/kl5Kl6SOoos" frameborder="0" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe width="100%" height="315" src="https://www.youtube.com/embed/CEGG2yAnOJs" frameborder="0" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe width="100%" height="315" src="https://www.youtube.com/embed/sgGxjvXAciA" frameborder="0" allowfullscreen></iframe>
</div>

<div class="video-card">
<iframe width="100%" height="315" src="https://www.youtube.com/embed/JvSaQBnjnpU" frameborder="0" allowfullscreen></iframe>
</div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">
<h2>Contact Me</h2>

<a href="mailto:gandevivek33@gmail.com">📧 gandevivek33@gmail.com</a>
<a href="https://wa.me/918247846083">💬 WhatsApp Me</a>

</section>

<!-- MUSIC -->
<audio id="bg-music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    const music = document.getElementById("bg-music");
    music.play();
}
</script>

</body>
</html>
